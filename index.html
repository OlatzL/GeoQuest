<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GeoQuest: Interactive Wall Quiz</title>
    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>
    <style>
        :root {
            --bg: #000000;
            --surface: #111111;
            --accent: #FF3E00;
            --p1: #00F0FF;
            --p2: #FFD600;
            --ink: #FFFFFF;
            --font-display: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            --ui-scale: 1.2;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: var(--font-display);
            background-color: var(--bg);
            color: var(--ink);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
            display: flex;
            flex-direction: column;
        }

        /* Layout Zones */
        #app-container {
            display: grid;
            grid-template-rows: 1fr;
            height: 100%;
            width: 100%;
            padding: 40px;
        }

        /* Typography & UI Elements */
        h1 {
            font-size: calc(6rem * var(--ui-scale));
            font-weight: 900;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            line-height: 0.8;
            margin-bottom: 20px;
        }

        .large-text {
            font-size: calc(2.5rem * var(--ui-scale));
            font-weight: 800;
            text-transform: uppercase;
        }

        .label-text {
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--accent);
        }

        /* Buttons */
        .btn {
            background: transparent;
            border: 2px solid var(--ink);
            color: var(--ink);
            padding: 1.5rem 3rem;
            font-size: 20px;
            font-weight: 800;
            border-radius: 0;
            cursor: pointer;
            transition: all 0.1s ease;
            min-width: 280px;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .btn:active, .btn.active {
            background: var(--ink);
            color: var(--bg);
            transform: scale(0.98);
        }

        .btn-primary {
            background: var(--ink);
            color: var(--bg);
        }

        /* Map Container */
        #map-viewport {
            position: relative;
            flex: 1;
            background: #001529; /* Deep water blue */
            border-radius: 0;
            border: 2px solid rgba(255,255,255,0.1);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .country-path {
            fill: #1a1a1a; /* Land color */
            stroke: #444; /* Border color */
            stroke-width: 0.5;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .country-path:hover {
            fill: #333;
        }

        .country-path.correct {
            fill: var(--accent) !important;
            filter: drop-shadow(0 0 15px var(--accent));
            stroke: var(--ink);
            stroke-width: 1;
        }

        .country-path.wrong {
            fill: #0a0a0a !important;
            opacity: 0.3;
        }

        .country-path.highlight {
            fill: var(--accent);
            stroke: var(--ink);
            stroke-width: 1;
        }

        .ocean {
            fill: #001529;
        }

        /* Game HUD */
        #hud {
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            gap: 40px;
            align-items: end;
            width: 100%;
            border-bottom: 2px solid var(--ink);
            padding-bottom: 20px;
            margin-bottom: 40px;
        }

        .player-card {
            padding: 24px;
            border: 2px solid rgba(255,255,255,0.1);
            position: relative;
            background: transparent;
            min-width: 0;
        }

        .player-card.active {
            border-color: var(--ink);
            background: rgba(255,255,255,0.05);
        }

        #p1-card { border-left: 12px solid var(--p1); }
        #p2-card { border-left: 12px solid var(--p2); }

        .score-val {
            font-size: 64px;
            font-weight: 900;
            line-height: 1;
            color: var(--ink);
        }

        #prompt-container {
            text-align: left;
        }

        #current-target {
            font-size: 96px;
            font-weight: 900;
            line-height: 0.8;
            color: var(--ink);
            text-transform: uppercase;
            letter-spacing: -0.04em;
            margin-top: 10px;
        }

        #round-counter {
            font-size: 24px;
            font-weight: 300;
            opacity: 0.5;
            color: var(--ink);
            text-transform: none;
            letter-spacing: 0;
        }

        /* Screens */
        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        .screen.active {
            display: flex;
        }

        #screen-start {
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            max-width: 1200px;
        }

        /* Feedback Overlay */
        #feedback-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 100;
            font-size: 15rem;
            font-weight: 900;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        /* Results Screen */
        #screen-results {
            align-items: center;
            justify-content: center;
        }

        #results-list {
            width: 100%;
            max-width: 800px;
            margin: 40px 0;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            font-size: 24px;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* Utilities */
        .notification-pill {
            position: absolute;
            top: -15px;
            right: -10px;
            background: var(--accent);
            color: white;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 900;
            border-radius: 4px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- SCREEN: START MENU -->
        <div id="screen-start" class="screen active">
            <div style="text-align: center; margin-bottom: 4rem;">
                <div class="label-text">Interactive Installation</div>
                <h1>GEOQUEST</h1>
                <div class="large-text" style="color: var(--text-secondary);">World & Europe Geography Challenge</div>
            </div>
            
            <div class="menu-grid">
                <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                    <div class="label-text">1. Select Mode</div>
                    <button class="btn active" id="mode-single" onclick="setMode('single')">Single Player</button>
                    <button class="btn" id="mode-multi" onclick="setMode('multi')">Two Players</button>
                </div>
                <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                    <div class="label-text">2. Select Level</div>
                    <button class="btn active" id="level-europe" onclick="setLevel('europe')">Europe</button>
                    <button class="btn" id="level-world" onclick="setLevel('world')">World</button>
                </div>
            </div>

            <button class="btn btn-primary" style="margin-top: 5rem; width: 600px;" onclick="startGame(event)">Start Expedition</button>
        </div>

        <!-- SCREEN: GAMEPLAY -->
        <div id="screen-game" class="screen">
            <div id="hud">
                <div id="p1-card" class="player-card active">
                    <div class="notification-pill" id="p1-pill">YOUR TURN</div>
                    <div class="label-text">Player 1</div>
                    <div class="score-val" id="p1-score">0</div>
                </div>

                <div id="prompt-container">
                    <div class="label-text" id="turn-indicator">Locate the country</div>
                    <div id="current-target">FRANCE</div>
                    <div class="label-text" id="round-counter">Round 1 / 8</div>
                </div>

                <div id="p2-card" class="player-card">
                    <div class="notification-pill" id="p2-pill" style="display: none;">YOUR TURN</div>
                    <div class="label-text">Player 2</div>
                    <div class="score-val" id="p2-score">0</div>
                </div>
            </div>

            <div id="map-viewport" style="width: 100%; height: 100%;">
                <!-- SVG Map is injected dynamically by renderMap() -->
            </div>
        </div>

        <!-- SCREEN: RESULTS -->
        <div id="screen-results" class="screen">
            <h1 id="winner-text">GAME OVER</h1>
            <div id="results-summary" class="large-text" style="margin: 2rem 0;"></div>
            
            <div id="results-list"></div>

            <button class="btn btn-primary" onclick="resetToMenu()">Return to Menu</button>
        </div>
    </div>

    <div id="feedback-overlay"></div>

    <script>
        /**
         * GEOGRAPHY DATA
         * We use ISO Alpha-3 codes to match TopoJSON data.
         */
        const COUNTRIES_CONFIG = {
            europe: [
                { id: 'ESP', name: 'Spain' },
                { id: 'FRA', name: 'France' },
                { id: 'DEU', name: 'Germany' },
                { id: 'ITA', name: 'Italy' },
                { id: 'GBR', name: 'United Kingdom' },
                { id: 'POL', name: 'Poland' },
                { id: 'PRT', name: 'Portugal' },
                { id: 'GRC', name: 'Greece' },
                { id: 'NOR', name: 'Norway' },
                { id: 'SWE', name: 'Sweden' },
                { id: 'FIN', name: 'Finland' },
                { id: 'IRL', name: 'Ireland' },
                { id: 'BEL', name: 'Belgium' },
                { id: 'NLD', name: 'Netherlands' },
                { id: 'CHE', name: 'Switzerland' },
                { id: 'AUT', name: 'Austria' },
                { id: 'UKR', name: 'Ukraine' },
                { id: 'ROU', name: 'Romania' },
                { id: 'CZE', name: 'Czechia' },
                { id: 'HUN', name: 'Hungary' }
            ],
            world: [
                { id: 'USA', name: 'USA' },
                { id: 'BRA', name: 'Brazil' },
                { id: 'CHN', name: 'China' },
                { id: 'IND', name: 'India' },
                { id: 'RUS', name: 'Russia' },
                { id: 'AUS', name: 'Australia' },
                { id: 'CAN', name: 'Canada' },
                { id: 'EGY', name: 'Egypt' },
                { id: 'ZAF', name: 'South Africa' },
                { id: 'ARG', name: 'Argentina' },
                { id: 'MEX', name: 'Mexico' },
                { id: 'PSE', name: 'Palestine' },
                { id: 'JPN', name: 'Japan' },
                { id: 'SAU', name: 'Saudi Arabia' },
                { id: 'TUR', name: 'Turkey' },
                { id: 'IDN', name: 'Indonesia' }
            ]
        };

        // GAME STATE
        let state = {
            mode: 'single', 
            level: 'europe',
            currentPlayer: 1,
            scores: { 1: 0, 2: 0 },
            questions: [],
            currentIndex: 0,
            maxQuestions: 8,
            isProcessing: false,
            mapData: null // Will hold TopoJSON
        };

        // D3 Map Globals
        let projection, pathGenerator, svg, g;

        // INITIALIZATION
        async function initMapData() {
            try {
                console.log("Fetching map data...");
                const response = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
                state.mapData = await response.json();
                console.log("Map data loaded successfully:", state.mapData);
            } catch (err) {
                console.error("Failed to load map data", err);
            }
        }

        initMapData();

        // UI ELEMENTS
        const screens = {
            start: document.getElementById('screen-start'),
            game: document.getElementById('screen-game'),
            results: document.getElementById('screen-results')
        };

        const mapLayers = document.getElementById('map-layers');
        const feedbackOverlay = document.getElementById('feedback-overlay');

        // INITIALIZATION
        function setMode(mode) {
            state.mode = mode;
            document.getElementById('mode-single').classList.toggle('active', mode === 'single');
            document.getElementById('mode-multi').classList.toggle('active', mode === 'multi');
        }

        function setLevel(level) {
            state.level = level;
            document.getElementById('level-europe').classList.toggle('active', level === 'europe');
            document.getElementById('level-world').classList.toggle('active', level === 'world');
        }

        function switchScreen(screenId) {
            Object.values(screens).forEach(s => s.classList.remove('active'));
            screens[screenId].classList.add('active');
        }

        async function startGame(event) {
            const startBtn = event?.currentTarget || event?.target;
            if (startBtn && startBtn.tagName === 'BUTTON') startBtn.innerText = "Loading Map...";

            if (!state.mapData) {
                await initMapData();
            }

            if (!state.mapData) {
                alert("Failed to load map data. Please check your connection.");
                if (startBtn) startBtn.innerText = "Start Expedition";
                return;
            }

            if (startBtn) startBtn.innerText = "Start Expedition";

            // Reset state
            state.scores = { 1: 0, 2: 0 };
            state.currentIndex = 0;
            state.currentPlayer = 1;
            state.isProcessing = false;

            // Prepare questions
            const pool = [...COUNTRIES_CONFIG[state.level]];
            state.questions = pool.sort(() => 0.5 - Math.random()).slice(0, state.maxQuestions);

            // Setup UI
            document.getElementById('p1-score').innerText = '0';
            document.getElementById('p2-score').innerText = '0';
            document.getElementById('p2-card').style.visibility = state.mode === 'multi' ? 'visible' : 'hidden';
            
            switchScreen('game');
            
            // Wait for DOM to update visibility so we can get dimensions
            requestAnimationFrame(() => {
                renderMap();
                updateHUD();
                nextQuestion();
            });
        }

        function renderMap() {
            try {
                const viewport = document.getElementById('map-viewport');
                if (!viewport) throw new Error("map-viewport not found");

                if (!state.mapData || !state.mapData.objects || !state.mapData.objects.countries) {
                    throw new Error("Map data is invalid or not loaded");
                }

                viewport.innerHTML = '';

                const width = viewport.clientWidth || window.innerWidth * 0.8;
                const height = viewport.clientHeight || window.innerHeight * 0.6;

                console.log(`Rendering map: ${width}x${height} for level: ${state.level}`);

                svg = d3.select(viewport)
                    .append("svg")
                    .attr("id", "game-map")
                    .attr("viewBox", `0 0 ${width} ${height}`)
                    .attr("preserveAspectRatio", "xMidYMid meet");

                // Add ocean background
                svg.append("rect")
                    .attr("width", width)
                    .attr("height", height)
                    .attr("class", "ocean");

                g = svg.append("g");

                // Convert TopoJSON to GeoJSON
                const countries = topojson.feature(state.mapData, state.mapData.objects.countries);
                console.log(`Rendering ${countries.features.length} countries`);

                // Build the feature collection used to frame the projection
                let fitCollection;
                if (state.level === 'europe') {
                    const europeIds = new Set(
                        COUNTRIES_CONFIG.europe
                            .map(c => Number(ISO_MAP[c.id]))
                            .filter(id => !isNaN(id))
                    );
                    fitCollection = {
                        type: 'FeatureCollection',
                        features: countries.features.filter(f => europeIds.has(Number(f.id)))
                    };
                } else {
                    fitCollection = countries;
                }

                // Setup projection with automatic fitSize – no manual scale/center/translate
                projection = d3.geoMercator();
                projection.fitSize([width, height], fitCollection);
                pathGenerator = d3.geoPath().projection(projection);

                g.selectAll("path")
                    .data(countries.features)
                    .enter()
                    .append("path")
                    .attr("d", pathGenerator)
                    .attr("class", "country-path")
                    .attr("id", d => `country-${Number(d.id)}`)
                    .on("click", (event, d) => {
                        handleCountryClick(d.id, event);
                    });
            } catch (err) {
                console.error("Error in renderMap:", err);
                alert("An error occurred while rendering the map. Please check the console.");
            }
        }

        // Helper to map ISO Alpha-3 to Numeric (simplified for demo)
        // In a real app, you'd have a full mapping table.
        const ISO_MAP = {
            'ESP': '724', 'FRA': '250', 'DEU': '276', 'ITA': '380', 'GBR': '826',
            'POL': '616', 'PRT': '620', 'GRC': '300', 'NOR': '578', 'SWE': '752',
            'FIN': '246', 'IRL': '372', 'BEL': '056', 'NLD': '528', 'CHE': '756',
            'AUT': '040', 'UKR': '804', 'ROU': '642', 'CZE': '203', 'HUN': '348',
            'USA': '840', 'BRA': '076', 'CHN': '156', 'IND': '356', 'RUS': '643',
            'AUS': '036', 'CAN': '124', 'EGY': '818', 'ZAF': '710', 'ARG': '032',
            'MEX': '484', 'PSE': '275', 'JPN': '392', 'SAU': '682', 'TUR': '792',
            'IDN': '360'
        };

        function updateHUD() {
            const q = state.questions[state.currentIndex];
            document.getElementById('current-target').innerText = q.name.toUpperCase();
            document.getElementById('round-counter').innerText = `Round ${state.currentIndex + 1} / ${state.maxQuestions}`;
            
            if (state.mode === 'multi') {
                document.getElementById('turn-indicator').innerText = `Player ${state.currentPlayer}'s Turn`;
                document.getElementById('p1-card').classList.toggle('active', state.currentPlayer === 1);
                document.getElementById('p2-card').classList.toggle('active', state.currentPlayer === 2);
                document.getElementById('p1-pill').style.display = state.currentPlayer === 1 ? 'block' : 'none';
                document.getElementById('p2-pill').style.display = state.currentPlayer === 2 ? 'block' : 'none';
            } else {
                document.getElementById('turn-indicator').innerText = `Locate the country`;
                document.getElementById('p1-pill').style.display = 'block';
                document.getElementById('p2-pill').style.display = 'none';
            }
        }

        function nextQuestion() {
            if (state.currentIndex >= state.maxQuestions) {
                endGame();
                return;
            }
            updateHUD();
        }

        function handleCountryClick(numericId, event) {
            if (state.isProcessing) return;
            
            const target = state.questions[state.currentIndex];
            const targetNumericId = ISO_MAP[target.id];
            
            state.isProcessing = true;

            const isCorrect = Number(numericId) === Number(targetNumericId);
            const clickedPath = d3.select(`#country-${Number(numericId)}`);

            if (isCorrect) {
                state.scores[state.currentPlayer]++;
                clickedPath.classed('correct', true);
                showFeedback('✓', 'var(--accent)');
                
                confetti({
                    particleCount: 100,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#FF3E00', '#ffffff']
                });
            } else {
                clickedPath.classed('wrong', true);
                d3.select(`#country-${Number(targetNumericId)}`).classed('highlight', true);
                showFeedback('✗', 'var(--accent)');
            }

            document.getElementById(`p${state.currentPlayer}-score`).innerText = state.scores[state.currentPlayer];

            setTimeout(() => {
                clickedPath.classed('correct', false).classed('wrong', false);
                d3.select(`#country-${Number(targetNumericId)}`).classed('highlight', false);
                
                state.currentIndex++;
                if (state.mode === 'multi') {
                    state.currentPlayer = state.currentPlayer === 1 ? 2 : 1;
                }
                
                state.isProcessing = false;
                nextQuestion();
            }, 1500);
        }

        function showFeedback(text, color) {
            feedbackOverlay.innerText = text;
            feedbackOverlay.style.color = color;
            feedbackOverlay.style.opacity = '1';
            setTimeout(() => {
                feedbackOverlay.style.opacity = '0';
            }, 800);
        }

        function endGame() {
            switchScreen('results');
            
            let summary = '';
            if (state.mode === 'multi') {
                if (state.scores[1] > state.scores[2]) {
                    summary = 'Player 1 Wins!';
                    document.getElementById('winner-text').innerText = 'VICTORY: PLAYER 1';
                } else if (state.scores[2] > state.scores[1]) {
                    summary = 'Player 2 Wins!';
                    document.getElementById('winner-text').innerText = 'VICTORY: PLAYER 2';
                } else {
                    summary = "It's a Draw!";
                    document.getElementById('winner-text').innerText = 'DRAW';
                }
                summary += `<br>P1: ${state.scores[1]} | P2: ${state.scores[2]}`;
            } else {
                summary = `Final Score: ${state.scores[1]} / ${state.maxQuestions}`;
                document.getElementById('winner-text').innerText = state.scores[1] > 5 ? 'EXCELLENT!' : 'GOOD EFFORT';
            }
            
            document.getElementById('results-summary').innerHTML = summary;
            
            // Big confetti for game end
            confetti({
                particleCount: 300,
                spread: 160,
                origin: { y: 0.5 }
            });
        }

        function resetToMenu() {
            switchScreen('start');
        }

        // Prevent default touch behaviors
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });

        document.addEventListener('gesturestart', (e) => e.preventDefault());

    </script>
</body>
</html>
